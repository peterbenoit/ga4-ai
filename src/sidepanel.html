<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GA4 Query Assistant</title>
    <link rel="stylesheet" href="sidepanel.css">
    <script type="module" src="sidepanel.js"></script>
  </head>
  <body>
    <main>
      <p class="eyebrow">GA4 Query Assistant</p>
      <h1>Connect Google Analytics</h1>
      <p>Authorize read-only access to the GA4 properties available to your Google account.</p>
      <section class="auth-panel" aria-labelledby="auth-heading">
        <h2 id="auth-heading">Google Analytics connection</h2>
        <p id="auth-status" role="status">Checking Google Analytics connection…</p>
        <button id="connect-google" type="button" hidden>Connect Google Analytics</button>
      </section>
    </main>
  </body>
</html>
